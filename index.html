<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일 To-Do 앱</title>
<style>
  body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
  h2 { text-align: center; }
  #taskInput { width: 70%; padding: 15px; font-size: 18px; }
  #addBtn { padding: 15px; font-size: 18px; margin-left: 5px; }
  ul { list-style: none; padding: 0; }
  li { background: #fff; margin: 10px 0; padding: 15px; font-size: 18px; 
       border-radius: 10px; display: flex; justify-content: space-between; 
       align-items: center; touch-action: pan-y; }
  .done { text-decoration: line-through; color: gray; }
  .deleteBtn { background: red; color: white; border: none; padding: 10px 15px; 
               border-radius: 5px; font-size: 16px; }
</style>
</head>
<body>

<h2>내 할일 목록</h2>
<div style="display:flex; justify-content:center;">
  <input type="text" id="taskInput" placeholder="할일 입력">
  <button id="addBtn">추가</button>
</div>

<ul id="taskList"></ul>

<script>
const taskList = document.getElementById('taskList');
const taskInput = document.getElementById('taskInput');
const addBtn = document.getElementById('addBtn');

addBtn.onclick = addTask;
taskInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') addTask();
});

function addTask() {
  const taskText = taskInput.value.trim();
  if (!taskText) return;

  const li = document.createElement('li');
  li.textContent = taskText;

  // 완료 토글
  li.onclick = function() { li.classList.toggle('done'); }

  // 삭제 버튼
  const delBtn = document.createElement('button');
  delBtn.textContent = '삭제';
  delBtn.className = 'deleteBtn';
  delBtn.onclick = function(e) {
    e.stopPropagation();
    li.remove();
  }

  li.appendChild(delBtn);
  taskList.appendChild(li);
  taskInput.value = '';
}

// 간단 스와이프 삭제 (좌우 스와이프 시 삭제)
let startX;
taskList.addEventListener('touchstart', e => startX = e.touches[0].clientX);
taskList.addEventListener('touchend', e => {
  const endX = e.changedTouches[0].clientX;
  const diffX = endX - startX;
  if (Math.abs(diffX) > 100) {
    const li = e.target.closest('li');
    if (li) li.remove();
  }
});
</script>

</body>
</html>
